apiVersion: v1
kind: ServiceAccount
metadata:
  name: pagamentos
  namespace: loja-veloz
---
apiVersion: v1
kind: Service
metadata:
  name: pagamentos
  namespace: loja-veloz
  labels: { app: pagamentos }
spec:
  type: ClusterIP
  ports: [{ port: 8000, targetPort: 8000, name: http }]
  selector:
    app: pagamentos   # service pega TODAS as versões (v1 + v2 canary)
---
# Deployment STABLE (v1)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pagamentos-v1
  namespace: loja-veloz
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels:
      app: pagamentos
      version: v1
  template:
    metadata:
      labels:
        app: pagamentos
        version: v1
    spec:
      serviceAccountName: pagamentos
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: pagamentos
          image: ghcr.io/loja-veloz/pagamentos:1.0.0
          ports: [{ containerPort: 8000, name: http }]
          envFrom: [{ configMapRef: { name: loja-veloz-config } }]
          env:
            - name: APP_VERSION
              value: v1
            - name: RABBITMQ_USER
              valueFrom: { secretKeyRef: { name: loja-veloz-secrets, key: RABBITMQ_USER } }
            - name: RABBITMQ_PASSWORD
              valueFrom: { secretKeyRef: { name: loja-veloz-secrets, key: RABBITMQ_PASSWORD } }
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@$(RABBITMQ_HOST):5672/"
            - name: OTEL_SERVICE_NAME
              value: pagamentos
          resources:
            requests: { cpu: "150m", memory: "192Mi" }
            limits:   { cpu: "750m", memory: "384Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health/live, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
