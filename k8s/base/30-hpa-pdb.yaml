  namespace: loja-veloz
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: pagamentos-v1 }
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: estoque-hpa
  namespace: loja-veloz
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: estoque }
  minReplicas: 2
