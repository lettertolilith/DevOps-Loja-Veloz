  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: loja-veloz
spec:
  minAvailable: 1
  selector:
    matchLabels: { app: api-gateway }
---
