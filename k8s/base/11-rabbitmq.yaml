apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: loja-veloz
spec:
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
  selector:
    app: rabbitmq
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: loja-veloz
spec:
  serviceName: rabbitmq
  replicas: 1   # No MVP: 1. Em prod: 3 com mirroring/quorum queues.
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom: { secretKeyRef: { name: loja-veloz-secrets, key: RABBITMQ_USER } }
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom: { secretKeyRef: { name: loja-veloz-secrets, key: RABBITMQ_PASSWORD } }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            exec: { command: ["rabbitmq-diagnostics", "ping"] }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["rabbitmq-diagnostics", "status"] }
            initialDelaySeconds: 60
            periodSeconds: 30
