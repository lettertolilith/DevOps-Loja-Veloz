global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']
        labels: { service: 'api-gateway' }
  - job_name: 'pedidos'
    static_configs:
      - targets: ['pedidos:8000']
        labels: { service: 'pedidos' }
  - job_name: 'pagamentos'
    static_configs:
      - targets: ['pagamentos:8000']
        labels: { service: 'pagamentos' }
  - job_name: 'estoque'
    static_configs:
      - targets: ['estoque:8000']
        labels: { service: 'estoque' }
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
