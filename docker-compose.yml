# =============================================================================
# Loja Veloz — Docker Compose para desenvolvimento local
# Sobe TODA a stack com: docker compose up --build
# =============================================================================
name: loja-veloz

services:
  # --------------------------- Infraestrutura ---------------------------
  postgres:
    image: postgres:16-alpine
    container_name: lv-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_MULTIPLE_DATABASES: pedidos,estoque
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init.sh:ro
    ports: ["5432:5432"]
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: lv-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    networks: [backend]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------- Microsserviços ---------------------------
  api-gateway:
    build: ./services/api-gateway
    image: loja-veloz/api-gateway:dev
    environment:
      PEDIDOS_URL: http://pedidos:8000
      PAGAMENTOS_URL: http://pagamentos:8000
      ESTOQUE_URL: http://estoque:8000
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports: ["8080:8000"]
    depends_on: [pedidos, pagamentos, estoque]
    networks: [backend]

  pedidos:
    build: ./services/pedidos
    image: loja-veloz/pedidos:dev
    environment:
      DATABASE_URL: postgresql://app:${POSTGRES_PASSWORD:-app}@postgres:5432/pedidos
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      OTEL_SERVICE_NAME: pedidos
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [backend]

  pagamentos:
    build: ./services/pagamentos
    image: loja-veloz/pagamentos:dev
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      OTEL_SERVICE_NAME: pagamentos
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      APP_VERSION: v1
    depends_on:
      rabbitmq: { condition: service_healthy }
    networks: [backend]

  estoque:
    build: ./services/estoque
    image: loja-veloz/estoque:dev
    environment:
      DATABASE_URL: postgresql://app:${POSTGRES_PASSWORD:-app}@postgres:5432/estoque
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
      OTEL_SERVICE_NAME: estoque
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [backend]

  # --------------------------- Observabilidade ---------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    container_name: lv-otel
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./k8s/observability/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks: [backend]

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: lv-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI
    networks: [backend]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: lv-prometheus
    volumes:
      - ./k8s/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    networks: [backend]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: lv-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports: ["3000:3000"]
    networks: [backend]

volumes:
  pgdata:

networks:
  backend:
    driver: bridge
