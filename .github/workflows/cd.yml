name: CD — Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["CI — Build, Test e Publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente alvo'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  contents: read
  id-token: write   # OIDC para autenticar no cluster sem secrets de longo prazo

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      # url: https://${{ env.PUBLIC_URL }}   # opcional

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          aws-region: us-east-1

      - name: Configure kubeconfig
        run: aws eks update-kubeconfig --name loja-veloz-${{ github.event.inputs.environment || 'dev' }}

      - name: Setup kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in overlay
        working-directory: k8s/overlays/${{ github.event.inputs.environment || 'dev' }}
        run: |
          for svc in api-gateway pedidos pagamentos estoque; do
            kustomize edit set image ghcr.io/loja-veloz/$svc=ghcr.io/loja-veloz/$svc:sha-${GITHUB_SHA:0:7}
          done

      - name: Apply manifests (rolling update)
        run: kustomize build k8s/overlays/${{ github.event.inputs.environment || 'dev' }} | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl -n loja-veloz rollout status deploy/api-gateway --timeout=5m
          kubectl -n loja-veloz rollout status deploy/pedidos     --timeout=5m
          kubectl -n loja-veloz rollout status deploy/pagamentos-v1 --timeout=5m
          kubectl -n loja-veloz rollout status deploy/estoque    --timeout=5m

      - name: Smoke test
        run: |
          ENDPOINT=$(kubectl -n istio-system get svc istio-ingressgateway -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          curl -fsS "http://${ENDPOINT}/api/v1/pedidos/00000000-0000-0000-0000-000000000000" || true
